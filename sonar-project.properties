# ─────────────────────────────────────────────────────────────────────────────
# SonarQube — Configuración del análisis de AgentePro
# Ejecutar `sonar-scanner` desde la RAÍZ del repositorio.
#
# ANTES de escanear, regenerar la cobertura (desde la RAÍZ, para que las rutas del
# reporte queden como agentepro/backend/app/... y SonarQube las resuelva):
#   Backend :  $env:PYTHONPATH="agentepro/backend"; python -m pytest agentepro/backend/tests -c agentepro/backend/pyproject.toml --cov --cov-report=xml:agentepro/backend/coverage.xml
#   Frontend:  cd agentepro/frontend; npx vitest run --coverage
# ─────────────────────────────────────────────────────────────────────────────
sonar.projectKey=Proyecto-AgentePro-1ra
sonar.projectName=AgentePro
sonar.sourceEncoding=UTF-8
sonar.python.version=3.13

# Código fuente de PRODUCCIÓN (backend + frontend). El resto NO es código de prod.
sonar.sources=agentepro/backend/app,agentepro/frontend/src

# Se EXCLUYEN del análisis: dependencias, build, documentos, migraciones (alembic,
# autogeneradas), TESTS (su código no se gatea como producción) y archivos de
# configuración. Esto limpia cobertura, duplicaciones y los "async" de los tests.
sonar.exclusions=**/node_modules/**,**/dist/**,**/.scannerwork/**,**/__pycache__/**,docs/**,tools/**,**/*.docx,**/*.zip,agentepro/backend/tests/**,agentepro/backend/alembic/**,**/conftest.py,agentepro/frontend/src/test/**,agentepro/frontend/src/**/*.test.ts,agentepro/frontend/src/**/*.test.tsx,**/*.config.ts,**/*.config.js,**/Dockerfile*,**/Caddyfile,agentepro/frontend/index.html,agentepro/frontend/nginx.conf

# Detección de duplicados: ignora migraciones (boilerplate repetitivo).
sonar.cpd.exclusions=agentepro/backend/alembic/**

# ── Cobertura de pruebas ──────────────────────────────────────────────────────
sonar.python.coverage.reportPaths=agentepro/backend/coverage.xml
sonar.javascript.lcov.reportPaths=agentepro/frontend/coverage/lcov.info

# Código que NO se mide en cobertura (glue/arranque/visual, no testeable por unidad).
# Coincide con el `omit` de coverage (backend) y el `exclude` de vitest (frontend).
sonar.coverage.exclusions=agentepro/backend/app/workers/**,agentepro/backend/app/modal_tasks/**,agentepro/backend/app/main.py,agentepro/backend/app/core/socket.py,agentepro/backend/app/**/__init__.py,agentepro/backend/app/services/whatsapp/client.py,agentepro/backend/app/services/whatsapp/twilio_whatsapp_client.py,agentepro/backend/app/services/voice/twilio_client.py,agentepro/backend/app/services/voice/retell_client.py,agentepro/backend/app/services/notion/notion_client.py,agentepro/backend/app/services/instagram/client.py,agentepro/backend/app/services/instagram/scheduler.py,agentepro/backend/app/services/crm/**,agentepro/backend/app/services/provisioning/**,agentepro/frontend/src/main.tsx,agentepro/frontend/src/App.tsx,agentepro/frontend/src/router.tsx,agentepro/frontend/src/vite-env.d.ts,agentepro/frontend/src/**/*.d.ts,agentepro/frontend/src/pages/**,agentepro/frontend/src/components/common/AnimatedBackground.tsx
