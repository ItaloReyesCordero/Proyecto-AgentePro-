services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:socket_app --host 0.0.0.0 --port 8000 --workers 2"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: ./backend/.env
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: ./backend/.env
    command: celery -A app.workers.celery_app beat --loglevel=info

  # Backups automáticos de Postgres en producción.
  # La BD de prod suele ser externa (Supabase/Railway, con sus propios backups),
  # pero esto da una copia local extra. Requiere que backend/.env defina:
  #   PGHOST, PGPORT, PGUSER, PGPASSWORD, PGDATABASE
  # (los mismos datos que tu DATABASE_URL). Si tu proveedor ya hace backups
  # gestionados, este servicio es opcional.
  backup:
    image: postgres:16-alpine
    restart: always
    # backend/.env aporta PGHOST/.../PGDATABASE y, si la usas, la copia off-site:
    #   SUPABASE_URL, SUPABASE_SERVICE_KEY, SUPABASE_BACKUP_BUCKET/PREFIX/KEEP
    env_file: ./backend/.env
    environment:
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: "14"
      BACKUP_INTERVAL_SECONDS: "86400"
    volumes:
      - ./scripts:/scripts:ro
      - ./backups:/backups
    entrypoint: ["/bin/sh", "/scripts/backup_loop.sh"]
