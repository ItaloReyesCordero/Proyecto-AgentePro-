  <rect x="68" y="60" width="12" height="22" rx="6" fill="#ffffff"/>
  <circle cx="46.5" cy="66" r="2.4" fill="#BFDBFE"/>
  <circle cx="74.5" cy="66" r="2.4" fill="#BFDBFE"/>

