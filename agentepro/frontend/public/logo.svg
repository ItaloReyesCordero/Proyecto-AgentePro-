  </defs>

  <!-- Orejas / laterales -->
  <rect x="15" y="62" width="10" height="22" rx="5" fill="#2563EB"/>
  <rect x="95" y="62" width="10" height="22" rx="5" fill="#2563EB"/>

  <!-- Cabeza del bot -->
