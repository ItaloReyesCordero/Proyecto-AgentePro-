# Sirve la SPA de React. Cualquier ruta desconocida cae en index.html
# (necesario para React Router: /app, /privacidad, /terminos, etc.).
server {
    # Puerto no privilegiado (>1024) para poder correr nginx como usuario no-root
    # (imagen nginx-unprivileged). El proxy (Caddy) apunta a frontend:8080.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache largo para los assets con hash; el index nunca se cachea.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
